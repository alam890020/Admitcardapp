name: Build Admit Card APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build Android Project Structure
        run: |
          # Create all required folders
          mkdir -p app/src/main/java/com/admitcard/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # Copy HTML file to assets
          cp *.html app/src/main/assets/www/index.html 2>/dev/null || \
          cp index.html app/src/main/assets/www/index.html 2>/dev/null || \
          find . -maxdepth 1 -name "*.html" -exec cp {} app/src/main/assets/www/index.html \;

          echo "HTML copied successfully"

      - name: Create Android Project Files
        run: |

          # ── settings.gradle ──
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "AdmitCardApp"
          include ':app'
          EOF

          # ── build.gradle (root) ──
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # ── gradle.properties ──
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ── app/build.gradle ──
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.admitcard.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.admitcard.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # ── proguard-rules.pro ──
          echo "-keep class com.admitcard.app.** { *; }" > app/proguard-rules.pro

          # ── AndroidManifest.xml ──
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Admit Card"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AdmitCard"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.provider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          # ── MainActivity.java ──
          cat > app/src/main/java/com/admitcard/app/MainActivity.java << 'EOF'
          package com.admitcard.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.ConsoleMessage;
          import android.webkit.JsResult;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ValueCallback<Uri[]> filePathCallback;
              private static final int REQUEST_FILE_CHOOSER = 200;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setSupportZoom(true);
                  settings.setBuiltInZoomControls(true);
                  settings.setDisplayZoomControls(false);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  }
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          if (url.startsWith("file://") || url.startsWith("about:")) return false;
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                          return true;
                      }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> callback, FileChooserParams params) {
                          if (filePathCallback != null) filePathCallback.onReceiveValue(null);
                          filePathCallback = callback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("*/*");
                          startActivityForResult(Intent.createChooser(intent, "Select File"), REQUEST_FILE_CHOOSER);
                          return true;
                      }
                      @Override
                      public boolean onJsAlert(WebView view, String url, String message, JsResult result) {
                          new AlertDialog.Builder(MainActivity.this).setMessage(message)
                              .setPositiveButton("OK", (d, w) -> result.confirm())
                              .setOnCancelListener(d -> result.cancel()).create().show();
                          return true;
                      }
                      @Override
                      public boolean onConsoleMessage(ConsoleMessage msg) {
                          android.util.Log.d("AdmitCard", msg.message());
                          return true;
                      }
                  });
                  webView.loadUrl("file:///android_asset/www/index.html");
              }
              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == REQUEST_FILE_CHOOSER) {
                      if (filePathCallback == null) return;
                      Uri[] results = null;
                      if (resultCode == Activity.RESULT_OK && data != null && data.getData() != null)
                          results = new Uri[]{data.getData()};
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }
              @Override public void onBackPressed() { if (webView.canGoBack()) webView.goBack(); else super.onBackPressed(); }
              @Override protected void onPause() { super.onPause(); webView.onPause(); }
              @Override protected void onResume() { super.onResume(); webView.onResume(); }
          }
          EOF

          # ── activity_main.xml ──
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
          </RelativeLayout>
          EOF

          # ── strings.xml ──
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Admit Card</string></resources>
          EOF

          # ── themes.xml ──
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AdmitCard" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#000000</item>
                  <item name="colorPrimaryDark">#000000</item>
                  <item name="colorAccent">#333333</item>
              </style>
          </resources>
          EOF

          # ── file_paths.xml ──
          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-files-path name="my_images" path="Pictures" />
              <cache-path name="shared_images" path="images/" />
          </paths>
          EOF

          # ── Simple launcher icons (PNG via Python) ──
          python3 << 'PYEOF'
          try:
              from PIL import Image, ImageDraw, ImageFont
              sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
              for folder, size in sizes.items():
                  img = Image.new('RGB',(size,size),color='#111111')
                  draw = ImageDraw.Draw(img)
                  try:
                      font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", int(size*0.55))
                  except:
                      font = ImageFont.load_default()
                  text="A"
                  bbox=draw.textbbox((0,0),text,font=font)
                  tw,th=bbox[2]-bbox[0],bbox[3]-bbox[1]
                  draw.text(((size-tw)//2,(size-th)//2-bbox[1]),text,fill='white',font=font)
                  path=f'app/src/main/res/{folder}'
                  img.save(f'{path}/ic_launcher.png')
                  img.save(f'{path}/ic_launcher_round.png')
              print("Icons created with Pillow")
          except ImportError:
              import struct, zlib, base64
              # Minimal 1x1 white PNG
              def make_png(size):
                  raw = b'\x00' + b'\xff\xff\xff' * size
                  raw = raw * size
                  def chunk(name, data):
                      c = struct.pack('>I', len(data)) + name + data
                      return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
                  ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
                  idat = zlib.compress(raw)
                  return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
              sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
              for folder, size in sizes.items():
                  data = make_png(size)
                  with open(f'app/src/main/res/{folder}/ic_launcher.png','wb') as f: f.write(data)
                  with open(f'app/src/main/res/{folder}/ic_launcher_round.png','wb') as f: f.write(data)
              print("Icons created with fallback")
          PYEOF

          echo "All project files created!"

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.7
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AdmitCard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
